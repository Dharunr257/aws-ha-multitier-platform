version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: aws-dashboard-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: dashboardpwd
      MYSQL_DATABASE: aws_dashboard
    ports:
      - "3306:3306"
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdashboardpwd"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aws-dashboard-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=dashboardpwd
      - DB_NAME=aws_dashboard
      - AWS_INSTANCE_ID=i-0df78921be4a8efd3
      - AWS_AVAILABILITY_ZONE=us-east-1a
      - CONTAINER_VERSION=1.0.0
    depends_on:
      db:
        condition: service_healthy
